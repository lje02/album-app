<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram 下载机器人 - 文件管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 登录界面 */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            color: #6c757d;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 主界面 */
        .main-container {
            display: none;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: #212529;
        }
        
        .header-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info {
            text-align: right;
        }
        
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #495057;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: #e9ecef;
            color: #495057;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #dee2e6;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }
        
        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #212529;
        }
        
        /* 搜索栏 */
        .search-bar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        /* 文件列表 */
        .files-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .section-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            font-size: 18px;
            font-weight: 600;
            color: #212529;
        }
        
        .file-list {
            list-style: none;
        }
        
        .file-item {
            padding: 16px 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .file-item:hover {
            background: #f8f9fa;
        }
        
        .file-item:last-child {
            border-bottom: none;
        }
        
        .file-info {
            flex: 1;
        }
        
        .file-name {
            font-weight: 500;
            color: #212529;
            margin-bottom: 5px;
        }
        
        .file-meta {
            font-size: 13px;
            color: #6c757d;
        }
        
        .file-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-play {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-play:hover {
            transform: scale(1.05);
        }
        
        .btn-download {
            background: #e9ecef;
            color: #495057;
        }
        
        .btn-download:hover {
            background: #dee2e6;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            background: #f8f9fa;
        }
        
        .tab-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #667eea;
            border-color: #667eea;
            background: white;
        }
        
        .tab-btn:hover {
            background: white;
            color: #667eea;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e9ecef;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 错误提示 */
        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #f5c6cb;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #c3e6cb;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-text {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .file-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .file-actions {
                width: 100%;
                margin-top: 10px;
            }
            
            .btn-small {
                flex: 1;
            }
            
            .login-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-view" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-title">📥 下载管理</div>
                <div class="login-subtitle">Telegram 文件管理系统</div>
            </div>
            
            <div id="login-error" class="alert alert-error" style="display: none;"></div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="输入登录密码"
                        required
                    >
                </div>
                
                <button type="submit" class="btn btn-primary" id="login-btn">
                    登录
                </button>
            </form>
        </div>
    </div>
    
    <!-- 主界面 -->
    <div id="main-view" class="main-container">
        <div class="container">
            <!-- 顶部栏 -->
            <div class="header">
                <div class="header-title">📥 文件管理中心</div>
                <div class="header-user">
                    <div class="user-info">
                        <div class="user-name">已登录</div>
                    </div>
                    <button class="logout-btn" onclick="handleLogout()">登出</button>
                </div>
            </div>
            
            <!-- 统计信息 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-label">总文件数</div>
                    <div class="stat-value" id="total-files">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💾</div>
                    <div class="stat-label">总大小</div>
                    <div class="stat-value" id="total-size">0 B</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎬</div>
                    <div class="stat-label">视频</div>
                    <div class="stat-value" id="video-count">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎵</div>
                    <div class="stat-label">音频</div>
                    <div class="stat-value" id="audio-count">0</div>
                </div>
            </div>
            
            <!-- 搜索栏 -->
            <div class="search-bar">
                <input 
                    type="text" 
                    id="search-input" 
                    class="search-input" 
                    placeholder="搜索文件名..."
                    onkeyup="debounceSearch()"
                >
            </div>
            
            <!-- 文件列表 -->
            <div class="files-section">
                <div class="section-header">
                    📁 文件列表
                </div>
                
                <div class="tabs">
                    <button class="tab-btn active" onclick="filterByType('all')">全部</button>
                    <button class="tab-btn" onclick="filterByType('video')">视频</button>
                    <button class="tab-btn" onclick="filterByType('audio')">音频</button>
                    <button class="tab-btn" onclick="filterByType('photo')">图片</button>
                    <button class="tab-btn" onclick="filterByType('document')">文档</button>
                </div>
                
                <div id="files-container">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ────────────────────────────────────────────────────────
        //  全局变量
        // ────────────────────────────────────────────────────────
        
        let authToken = null;
        let allFiles = [];
        let currentFilter = 'all';
        let searchTimeout = null;
        
        // ────────────────────────────────────────────────────────
        //  初始化
        // ────────────────────────────────────────────────────────
        
        document.addEventListener('DOMContentLoaded', () => {
            authToken = localStorage.getItem('auth_token');
            
            if (authToken) {
                showMainView();
                loadStats();
                loadFiles();
            } else {
                showLoginView();
            }
        });
        
        // ────────────────────────────────────────────────────────
        //  视图切换
        // ────────────────────────────────────────────────────────
        
        function showLoginView() {
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('main-view').style.display = 'none';
        }
        
        function showMainView() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }
        
        // ────────────────────────────────────────────────────────
        //  登录
        // ────────────────────────────────────────────────────────
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const loginError = document.getElementById('login-error');
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            loginError.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    authToken = data.token;
                    localStorage.setItem('auth_token', authToken);
                    document.getElementById('password').value = '';
                    showMainView();
                    loadStats();
                    loadFiles();
                } else {
                    showError(loginError, data.error || '登录失败');
                }
            } catch (error) {
                showError(loginError, '网络错误：' + error.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }
        
        function handleLogout() {
            localStorage.removeItem('auth_token');
            authToken = null;
            showLoginView();
        }
        
        // ────────────────────────────────────────────────────────
        //  加载数据
        // ────────────────────────────────────────────────────────
        
        async function loadStats() {
            try {
                const response = await fetch(`/api/stats?token=${authToken}`);
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.stats;
                    document.getElementById('total-files').textContent = stats.total_files || 0;
                    document.getElementById('total-size').textContent = formatSize(stats.total_size || 0);
                    
                    const byType = stats.by_type || {};
                    document.getElementById('video-count').textContent = 
                        byType.video?.count || 0;
                    document.getElementById('audio-count').textContent = 
                        byType.audio?.count || 0;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }
        
        async function loadFiles() {
            try {
                const response = await fetch(`/api/files/all?token=${authToken}&limit=100`);
                const data = await response.json();
                
                if (data.success) {
                    allFiles = data.files || [];
                    renderFiles();
                }
            } catch (error) {
                console.error('加载文件失败:', error);
            }
        }
        
        // ────────────────────────────────────────────────────────
        //  搜索
        // ────────────────────────────────────────────────────────
        
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(performSearch, 300);
        }
        
        async function performSearch() {
            const keyword = document.getElementById('search-input').value.trim();
            
            if (!keyword) {
                renderFiles();
                return;
            }
            
            try {
                const response = await fetch(
                    `/api/search?q=${encodeURIComponent(keyword)}&token=${authToken}`
                );
                const data = await response.json();
                
                if (data.success) {
                    allFiles = data.files || [];
                    renderFiles();
                }
            } catch (error) {
                console.error('搜索失败:', error);
            }
        }
        
        // ────────────────────────────────────────────────────────
        //  过滤
        // ────────────────────────────────────────────────────────
        
        function filterByType(type) {
            currentFilter = type;
            
            // 更新标签页
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderFiles();
        }
        
        // ────────────────────────────────────────────────────────
        //  渲染文件列表
        // ────────────────────────────────────────────────────────
        
        function renderFiles() {
            let filtered = allFiles;
            
            if (currentFilter !== 'all') {
                filtered = allFiles.filter(f => f.media_type === currentFilter);
            }
            
            const container = document.getElementById('files-container');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">暂无文件</div>
                    </div>
                `;
                return;
            }
            
            const html = `
                <ul class="file-list">
                    ${filtered.map(file => `
                        <li class="file-item">
                            <div class="file-info">
                                <div class="file-name">${escapeHtml(file.file_name)}</div>
                                <div class="file-meta">
                                    ${getMediaIcon(file.media_type)} 
                                    ${formatSize(file.file_size)} · 
                                    ${new Date(file.downloaded_at).toLocaleDateString('zh-CN')}
                                </div>
                            </div>
                            <div class="file-actions">
                                ${canStream(file.media_type) ? `
                                    <button class="btn-small btn-play" onclick="playFile(${file.id})">
                                        ▶️ 播放
                                    </button>
                                ` : ''}
                                <a class="btn-small btn-download" href="/api/download/${file.id}?token=${authToken}">
                                    ⬇️ 下载
                                </a>
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;
            
            container.innerHTML = html;
        }
        
        // ────────────────────────────────────────────────────────
        //  播放文件
        // ────────────────────────────────────────────────────────
        
        function playFile(fileId) {
            const playerUrl = `/player?id=${fileId}&token=${authToken}`;
            window.open(playerUrl, '_blank');
        }
        
        // ────────────────────────────────────────────────────────
        //  工具函数
        // ────────────────────────────────────────────────────────
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }
        
        function getMediaIcon(type) {
            const icons = {
                'video': '🎬',
                'audio': '🎵',
                'voice': '🎤',
                'photo': '🖼️',
                'sticker': '😊',
                'animation': '🎞️',
                'document': '📄'
            };
            return icons[type] || '📁';
        }
        
        function canStream(type) {
            return ['video', 'audio', 'voice', 'animation', 'photo', 'sticker'].includes(type);
        }
        
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        function showError(element, message) {
            element.textContent = message;
            element.style.display = 'block';
        }
    </script>
</body>
</html>
