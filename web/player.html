<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体播放器 - Telegram 下载机器人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .player-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }
        
        .player-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .player-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .player-close {
            cursor: pointer;
            font-size: 24px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        
        .player-close:hover {
            opacity: 1;
        }
        
        /* 视频播放器 */
        .video-player {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* 音频播放器 */
        .audio-player {
            padding: 40px 20px;
            text-align: center;
            background: #f8f9fa;
        }
        
        .audio-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        
        audio {
            width: 100%;
            margin-top: 20px;
        }
        
        /* 图片查看器 */
        .image-viewer {
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 600px;
            overflow: hidden;
        }
        
        .image-viewer img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* 信息面板 */
        .player-info {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .info-label {
            color: #6c757d;
            font-weight: 500;
        }
        
        .info-value {
            color: #495057;
            word-break: break-all;
        }
        
        /* 控制按钮 */
        .player-actions {
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e9ecef;
        }
        
        .btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        /* 加载状态 */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 15px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e9ecef;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 错误提示 */
        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #f5c6cb;
            margin: 20px;
        }
        
        /* 工具栏 */
        .player-toolbar {
            padding: 12px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 12px;
            color: #6c757d;
        }
        
        .toolbar-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        @media (max-width: 640px) {
            .player-container {
                border-radius: 0;
            }
            
            .player-header {
                padding: 16px;
            }
            
            .player-title {
                font-size: 16px;
            }
            
            .player-actions {
                flex-direction: column;
            }
            
            .info-row {
                flex-direction: column;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <!-- 头部 -->
        <div class="player-header">
            <div class="player-title" id="title">媒体播放器</div>
            <div class="player-close" onclick="window.history.back()">✕</div>
        </div>
        
        <!-- 播放器内容 -->
        <div id="player-content">
            <div class="loading">
                <div class="spinner"></div>
                <div>加载中...</div>
            </div>
        </div>
        
        <!-- 信息面板 -->
        <div class="player-info" id="info-panel" style="display: none;">
            <div class="info-row">
                <span class="info-label">文件名</span>
                <span class="info-value" id="info-filename">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">文件大小</span>
                <span class="info-value" id="info-size">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">类型</span>
                <span class="info-value" id="info-type">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">下载时间</span>
                <span class="info-value" id="info-date">-</span>
            </div>
        </div>
        
        <!-- 工具栏 -->
        <div class="player-toolbar" id="toolbar" style="display: none;">
            <div class="toolbar-item">
                <span id="duration-display">00:00</span>
            </div>
            <div class="toolbar-item" style="margin-left: auto;">
                <span id="quality-display">自适应</span>
            </div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="player-actions">
            <a class="btn btn-primary" id="download-btn" href="#">
                <span>📥 下载</span>
            </a>
            <button class="btn btn-secondary" onclick="window.history.back()">返回</button>
        </div>
    </div>
    
    <script>
        // ────────────────────────────────────────────────────────
        //  工具函数
        // ────────────────────────────────────────────────────────
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }
        
        function formatDuration(ms) {
            if (!ms) return '00:00';
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            if (hours > 0) {
                return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function showError(message) {
            document.getElementById('player-content').innerHTML = `
                <div class="error-box">
                    <strong>❌ 错误</strong><br>${message}
                </div>
            `;
        }
        
        // ────────────────────────────────────────────────────────
        //  获取文件 ID 和 Token
        // ────────────────────────────────────────────────────────
        
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        const token = urlParams.get('token') || localStorage.getItem('auth_token');
        
        if (!fileId || !token) {
            showError('缺少文件ID或认证令牌');
        }
        
        // ────────────────────────────────────────────────────────
        //  初始化播放器
        // ────────────────────────────────────────────────────────
        
        async function initPlayer() {
            try {
                // 获取元数据
                const metaResponse = await fetch(
                    `/api/stream/metadata/${fileId}?token=${token}`
                );
                
                if (!metaResponse.ok) {
                    throw new Error('无法获取文件信息');
                }
                
                const metaData = await metaResponse.json();
                
                if (!metaData.success) {
                    throw new Error(metaData.error || '获取文件信息失败');
                }
                
                const metadata = metaData.metadata;
                const mediaType = metadata.media_type;
                
                // 更新标题
                document.getElementById('title').textContent = metadata.file_name;
                
                // 更新信息面板
                document.getElementById('info-filename').textContent = metadata.file_name;
                document.getElementById('info-size').textContent = formatSize(metadata.file_size);
                document.getElementById('info-type').textContent = mediaType;
                document.getElementById('info-date').textContent = metadata.created_at.split(' ')[0];
                document.getElementById('info-panel').style.display = 'block';
                
                // 设置下载链接
                document.getElementById('download-btn').href = 
                    `/api/download/${fileId}?token=${token}`;
                
                // 根据类型加载播放器
                if (mediaType === 'video' || mediaType === 'animation') {
                    loadVideoPlayer(metadata);
                } else if (mediaType === 'audio' || mediaType === 'voice') {
                    loadAudioPlayer(metadata);
                } else if (mediaType === 'photo' || mediaType === 'sticker') {
                    loadImageViewer(metadata);
                } else {
                    showError(`不支持的媒体类型：${mediaType}`);
                }
                
            } catch (error) {
                console.error('初始化失败:', error);
                showError(`初始化失败：${error.message}`);
            }
        }
        
        // ────────────────────────────────────────────────────────
        //  视频播放器
        // ────────────────────────────────────────────────────────
        
        function loadVideoPlayer(metadata) {
            const videoUrl = `/api/stream/video/${fileId}?token=${token}`;
            
            const html = `
                <div class="video-player">
                    <video id="video" controls preload="metadata">
                        <source src="${videoUrl}" type="video/mp4">
                        您的浏览器不支持 HTML5 视频
                    </video>
                </div>
            `;
            
            document.getElementById('player-content').innerHTML = html;
            
            // 监听视频元数据
            const video = document.getElementById('video');
            if (video) {
                video.addEventListener('loadedmetadata', () => {
                    document.getElementById('duration-display').textContent = 
                        formatDuration(video.duration * 1000);
                    document.getElementById('toolbar').style.display = 'flex';
                });
                
                // 自动播放（如果允许）
                video.play().catch(() => {
                    console.log('自动播放被阻止');
                });
            }
        }
        
        // ─────────────────────────────────────��──────────────────
        //  音频播放器
        // ────────────────────────────────────────────────────────
        
        function loadAudioPlayer(metadata) {
            const audioUrl = `/api/stream/audio/${fileId}?token=${token}`;
            
            const html = `
                <div class="audio-player">
                    <div class="audio-icon">🎵</div>
                    <div style="font-size: 16px; font-weight: 500; color: #495057;">
                        ${metadata.file_name}
                    </div>
                    <audio id="audio" controls style="margin-top: 20px;">
                        <source src="${audioUrl}">
                        您的浏览器不支持 HTML5 音频
                    </audio>
                </div>
            `;
            
            document.getElementById('player-content').innerHTML = html;
            document.getElementById('toolbar').style.display = 'flex';
        }
        
        // ───────────────────���────────────────────────────────────
        //  图片查看器
        // ────────────────────────────────────────────────────────
        
        function loadImageViewer(metadata) {
            const imageUrl = `/api/stream/image/${fileId}?token=${token}`;
            
            const html = `
                <div class="image-viewer">
                    <img src="${imageUrl}" alt="${metadata.file_name}" />
                </div>
            `;
            
            document.getElementById('player-content').innerHTML = html;
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
