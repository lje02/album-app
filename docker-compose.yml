version: '3.8'

services:
  tg-downloader:
    build: .
    container_name: tg-downloader-bot
    restart: always
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./tg_downloader.db:/app/tg_downloader.db
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  file-server:
    image: nginx:alpine
    container_name: tg-downloader-files
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./downloads:/usr/share/nginx/html/downloads:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tg-downloader

volumes:
  tg-downloader-data:
  tg-downloader-logs: